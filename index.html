<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05060f" />
    <meta
      name="description"
      content="TraceNet AI — Geo-Intelligent Recovery Network. A futuristic platform for tracking, matching, and recovering lost and found items in real time."
    />
    <title>TraceNet AI · Geo-Intelligent Recovery Network</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet for the live map -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
            colors: {
              "tn-bg": "#05060f",
              "tn-surface": "#0b0d1c",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="src/styles.css?v=tracenet-1" />
  </head>
  <body class="bg-tn-bg text-slate-100 font-sans antialiased min-h-screen relative">
    <!-- Decorative ambient layer -->
    <div class="pointer-events-none fixed inset-0 -z-10 tn-grid-bg opacity-60"></div>
    <div class="pointer-events-none fixed inset-0 -z-10 tn-ambient"></div>

    <div id="root"></div>

    <!-- Loading splash (replaced once React hydrates) -->
    <noscript>
      <div style="padding: 2rem; text-align: center; color: #94a3b8">
        TraceNet AI requires JavaScript to render the recovery network.
      </div>
    </noscript>

    <!-- Leaflet UMD (exposes window.L) -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Babel Standalone — transpiles src/app.jsx in-browser -->
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

    <!--
      The app is loaded as an ES module (data-type="module") so it can use
      `import` statements for React, Framer Motion (via esm.sh) and Firebase
      (via the official gstatic ES build). Babel transforms JSX in-browser.
    -->
    <script
      type="text/babel"
      data-type="module"
      data-presets="react"
      src="src/app.jsx?v=tracenet-1"
    ></script>
  </body>
</html>
