<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <h1 class="logo">📍 Campus Lost & Found</h1>
        <div class="nav-buttons">
          <button id="authBtn" class="nav-btn" onclick="toggleAuth()">
            Sign In
          </button>
          <button
            id="myPostsBtn"
            class="nav-btn hidden"
            onclick="showMyPosts()"
          >
            My Posts
          </button>
          <button id="logoutBtn" class="nav-btn hidden" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeAuthModal()">&times;</span>
        <h2>Sign In / Sign Up</h2>
        <input type="email" id="authEmail" placeholder="Email" />
        <input type="password" id="authPassword" placeholder="Password" />
        <button onclick="signUp()">Sign Up</button>
        <button onclick="signIn()">Sign In</button>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Sidebar - Post Form -->
      <aside class="sidebar">
        <h2>Post an Item</h2>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="name" placeholder="Your full name" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="userEmail" placeholder="your@email.com" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
        </div>

        <div class="form-group">
          <label>Item Type</label>
          <select id="type">
            <option value="">Select type...</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
        </div>

        <div class="form-group">
          <label>Item Name</label>
          <input
            type="text"
            id="item"
            placeholder="e.g., AirPods, ID Card, Keys"
          />
        </div>

        <div class="form-group">
          <label>Item Description</label>
          <textarea
            id="description"
            placeholder="Color, brand, any identifying features..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input
            type="text"
            id="location"
            placeholder="e.g., Library, Cafeteria, Building A"
          />
        </div>

        <div class="form-group">
          <label>Date (when lost/found)</label>
          <input type="date" id="date" />
        </div>

        <button class="submit-btn" onclick="submitData()">📤 Post Item</button>
      </aside>

      <!-- Main Content - Items List -->
      <main class="content">
        <div class="search-filter">
          <input
            type="text"
            id="searchInput"
            placeholder="Search items..."
            onkeyup="filterItems()"
          />

          <select id="filterType" onchange="filterItems()">
            <option value="">All Types</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>

          <select id="filterCategory" onchange="filterItems()">
            <option value="">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Documents">Documents</option>
            <option value="Accessories">Accessories</option>
            <option value="Clothing">Clothing</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div id="matchNotification" class="match-notification hidden">
          <strong>🎉 New Match!</strong> Someone posted a matching item! Check
          below.
        </div>

        <h2>Available Items</h2>
        <div id="list" class="items-grid"></div>
      </main>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeContactModal()">&times;</span>
        <h2>Contact Information</h2>
        <div id="contactDetails"></div>
        <button onclick="copyContact()" class="copy-btn">
          📋 Copy Contact
        </button>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
